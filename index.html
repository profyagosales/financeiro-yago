<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Identidade -->
    <title>Financeiro do Yago</title>
    <meta name="description" content="App financeiro pessoal — controle de contas, cartões, investimentos, dívidas e metas. Offline-first." />

    <!-- Viewport / mobile — sem maximum-scale (era 5; combinava mal com
         o anti-zoom via font-size:16px em inputs e permitia double-tap
         zoom em standalone) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2A1E3F" />
    <meta name="color-scheme" content="light" />

    <!-- Favicon (Safari prefere PNG; SVG é fallback pra navegadores que aceitam) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/brand/mark-mono-dark.svg" color="#2A1E3F" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS / Safari PWA — apple-touch-icon DEVE ser PNG pro Safari macOS Dock -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Financeiro" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (share preview) -->
    <meta property="og:title" content="Financeiro do Yago" />
    <meta property="og:description" content="Seu app financeiro pessoal premium." />
    <meta property="og:image" content="/brand/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Financeiro do Yago" />
    <meta name="twitter:description" content="Seu app financeiro pessoal premium." />
    <meta name="twitter:image" content="/brand/og-image.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () { /* dev: silencia */ })
        })
      }
    </script>
  </body>
</html>
