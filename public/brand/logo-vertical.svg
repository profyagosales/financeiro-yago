<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" role="img" aria-label="Financeiro do Yago">
  <defs>
    <linearGradient id="lv-bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A1E3F"/>
      <stop offset="100%" stop-color="#3D3457"/>
    </linearGradient>
    <linearGradient id="lv-fy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F3"/>
      <stop offset="100%" stop-color="#D4D0C5"/>
    </linearGradient>
    <radialGradient id="lv-glow" cx="68%" cy="55%" r="42%">
      <stop offset="0%" stop-color="#F2C745" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Mark centralizado -->
  <g transform="translate(60 0)">
    <rect width="160" height="160" rx="40" fill="url(#lv-bg)"/>
    <circle cx="108" cy="85" r="55" fill="url(#lv-glow)"/>
    <path d="M 40 38 L 40 121 M 40 38 L 80 38 M 40 77 L 71 77"
          stroke="url(#lv-fy)" stroke-width="12.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 89 57 L 108 85 L 128 57 M 108 85 L 108 121"
          stroke="url(#lv-fy)" stroke-width="12.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="108" cy="85" r="5.3" fill="#F2C745"/>
  </g>
  <!-- Wordmark abaixo -->
  <g transform="translate(0 200)">
    <text x="140" y="60"
          text-anchor="middle"
          font-family="Fraunces, Georgia, serif"
          font-size="42"
          font-weight="700"
          letter-spacing="-1.2"
          fill="#2C1A0F">Financeiro<tspan fill="#C4553B">.</tspan></text>
    <text x="140" y="88"
          text-anchor="middle"
          font-family="'Plus Jakarta Sans', sans-serif"
          font-size="11"
          font-weight="700"
          letter-spacing="3"
          fill="#7A5C4F">DO YAGO</text>
  </g>
</svg>
