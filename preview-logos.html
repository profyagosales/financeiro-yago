  .sb-name{font-family:'Plus Jakarta Sans';font-size:14px;font-weight:700;color:white;letter-spacing:-.2px;}

  .f1{animation:float 3.5s ease-in-out infinite;display:inline-block}
  .f2{animation:float 3.5s ease-in-out infinite .6s;display:inline-block}
  .f3{animation:float 3.5s ease-in-out infinite 1.2s;display:inline-block}
