<svg xmlns="http://www.w3.org/2000/svg" width="96" height="62" viewBox="0 0 96 62" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="96" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2A2150"/>
      <stop offset="100%" stop-color="#110E2B"/>
    </linearGradient>
    <radialGradient id="gl" cx="18%" cy="18%" r="52%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="og" x1="52" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F1642E"/>
      <stop offset="100%" stop-color="#FCDD9D"/>
    </linearGradient>
    <filter id="gw" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ch" x1="9" y1="24" x2="27" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F8EE8A"/>
      <stop offset="35%"  stop-color="#D4A820"/>
      <stop offset="75%"  stop-color="#A8780C"/>
      <stop offset="100%" stop-color="#8B6210"/>
    </linearGradient>
  </defs>

  <!-- Card body -->
  <rect width="96" height="62" rx="9" fill="url(#bg)"/>
  <rect width="96" height="62" rx="9" fill="url(#gl)"/>
  <circle cx="88" cy="56" r="24" fill="rgba(241,100,46,0.055)"/>
  <rect x=".7" y=".7" width="94.6" height="60.6" rx="8.5" fill="none" stroke="rgba(196,195,227,0.18)" stroke-width="1.2"/>

  <!-- ECONOMIZA, -->
  <text x="88" y="14" text-anchor="end"
    font-family="'Plus Jakarta Sans',sans-serif"
    font-size="6.5" font-weight="800" letter-spacing="1.1"
    fill="#C4C3E3" opacity=".92">ECONOMIZA,</text>

  <!-- GAY glow -->
  <text x="88" y="28" text-anchor="end"
    font-family="'Bebas Neue',sans-serif"
    font-size="16" letter-spacing="2"
    fill="#F1642E" opacity=".35" filter="url(#gw)">GAY</text>
  <!-- GAY fill -->
  <text x="88" y="28" text-anchor="end"
    font-family="'Bebas Neue',sans-serif"
    font-size="16" letter-spacing="2"
    fill="url(#og)">GAY</text>

  <!-- Chip EMV 18×13 — 8 pads (2 col × 4 rows) -->
  <rect x="9" y="24" width="18" height="13" rx="2" fill="url(#ch)"/>
  <rect x="9" y="24" width="18" height="13" rx="2" fill="none" stroke="rgba(0,0,0,0.22)" stroke-width=".5"/>
  <line x1="9.5" y1="24.5" x2="26.5" y2="24.5" stroke="rgba(255,245,180,0.5)" stroke-width=".5"/>
  <!-- Coluna esquerda -->
  <rect x="10.2" y="25.2" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="10.2" y="25.2" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <rect x="10.2" y="28.0" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="10.2" y="28.0" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <rect x="10.2" y="30.8" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="10.2" y="30.8" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <rect x="10.2" y="33.6" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="10.2" y="33.6" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <!-- Coluna direita -->
  <rect x="18.6" y="25.2" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="18.6" y="25.2" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <rect x="18.6" y="28.0" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="18.6" y="28.0" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <rect x="18.6" y="30.8" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="18.6" y="30.8" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>
  <rect x="18.6" y="33.6" width="7.2" height="2.2" rx=".8" fill="rgba(0,0,0,0.26)"/>
  <rect x="18.6" y="33.6" width="7.2" height=".5"  rx=".8" fill="rgba(255,245,180,0.24)"/>

  <!-- Número -->
  <text x="9" y="51"
    font-family="'Courier New',monospace"
    font-size="4.5" letter-spacing=".2"
    fill="rgba(196,195,227,0.38)">4821 3956 7234 6490</text>

  <!-- Mastercard -->
  <circle cx="73" cy="47" r="6" fill="#EB001B" opacity=".92"/>
  <circle cx="80" cy="47" r="6" fill="#F79E1B" opacity=".92"/>
  <path d="M76.5,41.2 A6,6,0,0,1,76.5,52.8 A6,6,0,0,0,76.5,41.2Z" fill="#FF5000" opacity=".78"/>
  <text x="76.5" y="55.2" text-anchor="middle"
    font-family="Arial,sans-serif"
    font-size="2.2" font-weight="700" letter-spacing=".3"
    fill="rgba(255,255,255,0.3)">MASTERCARD</text>
</svg>
